<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnKahoot - Panel Gracza 🐴</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background: #fdfaf4; /* Kremowe tło z makiety */
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .container { 
            max-width: 520px; 
            width: 100%; 
            animation: fadeInWindow 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        
        /* 3A. EKRAN DOŁĄCZANIA */
        #joinArea { 
            background: white; 
            padding: 45px 35px; 
            border-radius: 32px; 
            border: 4px solid #ede9fe;
            box-shadow: 0 20px 40px rgba(109, 40, 217, 0.04); 
            text-align: center; 
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .logo-icon {
            background: #6d28d9;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #2d1b4e;
            letter-spacing: -0.5px;
        }

        #joinArea h1 { 
            color: #2d1b4e; 
            font-size: 2rem; 
            margin-bottom: 6px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        #joinArea .subtitle { 
            color: #6b7280; 
            font-size: 0.95rem; 
            margin-bottom: 25px; 
            font-weight: 500;
        }
        
        /* Wybór profilu (Zastąpiony konikami z makiety) */
        .avatar-grid { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin: 20px 0; 
        }

        .avatar-opt { 
            font-size: 1.8rem; 
            cursor: pointer; 
            padding: 10px; 
            border: 3px solid #f3e8ff; 
            border-radius: 16px; 
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: #fdfaff; 
        }

        .avatar-opt:hover { 
            transform: translateY(-4px); 
            background: #ede9fe; 
            border-color: #a78bfa;
        }

        .avatar-opt.selected { 
            border-color: #6d28d9; 
            background: #f3e8ff; 
            transform: scale(1.15); 
            animation: bounce 0.4s ease;
        }

        /* 3B & 3C. PANEL GRY (ZADWANIE PYTAŃ / FEEDBACK) */
        #gameArea { 
            display: none; 
            background: white; 
            padding: 40px 30px; 
            border-radius: 32px; 
            border: 4px solid #ede9fe;
            box-shadow: 0 20px 40px rgba(109, 40, 217, 0.04); 
            text-align: center; 
            position: relative;
        }

        #gameArea.active { 
            display: block; 
            animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        #joinArea.hidden { display: none; }

        /* Górna sekcja gry (Pokój i Czas) */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .room-tag {
            background: #f3e8ff;
            color: #6d28d9;
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        #playerTimer { 
            font-size: 1.1rem; 
            color: #6d28d9; 
            font-weight: 800; 
            background: #fdfaff;
            border: 2px solid #ede9fe;
            padding: 6px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Kontener obrazka fiszki */
        .player-img-container { 
            max-width: 100%; 
            margin: 20px auto; 
            display: none; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 3px solid #f3e8ff; 
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
        }

        .player-img-container img { 
            max-width: 100%; 
            max-height: 220px; 
            display: block; 
            margin: 0 auto; 
            object-fit: contain; 
        }

        #questionText { 
            font-size: 1.6rem; 
            margin: 20px 0; 
            color: #2d1b4e; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            line-height: 1.3;
        }
        
        /* Inputy tekstowe */
        input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid #ede9fe; 
            border-radius: 16px; 
            font-size: 1rem; 
            font-weight: 600;
            margin: 12px 0; 
            background: #fdfaff; 
            color: #2d1b4e; 
            transition: all 0.2s ease;
        }

        input::placeholder { color: #9ca3af; font-weight: 500; }
        input:focus { outline: none; border-color: #6d28d9; background: #fff; box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1); }
        
        /* Przyciski */
        button { 
            background: #6d28d9; 
            color: white; 
            border: none; 
            padding: 16px 28px; 
            border-radius: 16px; 
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            margin-top: 10px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.2);
        }

        button:hover { background: #5b21b6; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(109, 40, 217, 0.3); }
        button:active { transform: translateY(0); }

        .leave-btn { 
            background: #fee2e2; 
            color: #ef4444; 
            margin-top: 30px; 
            padding: 10px 20px; 
            font-size: 0.85rem; 
            border-radius: 12px; 
            font-weight: 700; 
            width: auto; 
            display: inline-flex; 
            align-items: center;
            gap: 6px;
            box-shadow: none;
        }
        .leave-btn:hover { background: #fca5a5; color: #991b1b; box-shadow: none; }

        /* Obszar informacji zwrotnej (Poprawna / Błędna odpowiedź) */
        #feedback { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 18px; 
            display: none; 
            font-size: 1.1rem; 
            font-weight: 700; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        /* Statystyki gracza (Dolna belka z makiety) */
        .player-status-bar {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #ede9fe;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        #playerScore { 
            font-size: 1rem; 
            color: #4b5563; 
            font-weight: 700; 
        }

        #playerScoreValue {
            color: #6d28d9;
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Podpowiedź u dołu ekranu logowania */
        .tip-box {
            background: #fffbeb;
            border: 2px solid #fef3c7;
            padding: 12px;
            border-radius: 14px;
            color: #b45309;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* ANIMACJE */
        @keyframes fadeInWindow {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.15) translateY(0); }
            50% { transform: scale(1.15) translateY(-6px); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="joinArea">
            <div class="logo-area">
                <div class="logo-icon">🐴</div>
                <div class="logo-text">AnKahoot</div>
            </div>
            <h1>Dołącz do gry</h1>
            <div class="subtitle">Wybierz swojego profilowego konika ✨</div>
            
            <div class="avatar-grid">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🐴')">🐴</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🦄')">🦄</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🦓')">🦓</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐎')">🐎</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🎠')">🎠</span>
            </div>

            <input id="name" placeholder="Wpisz swoje imię" type="text">
            <input id="roomCode" placeholder="PIN gry" type="text">
            <button onclick="join()">Dołącz do zabawy! 🚀</button>

            <div class="tip-box">
                💡 Wskazówka: Upewnij się, że gospodarz uruchomił pokój!
            </div>
        </div>

        <div id="gameArea">
            <div class="game-header">
                <div class="room-tag">Pokój: <span id="roomDisplay">123456</span></div>
                <div id="playerTimer">⏱️ <span>40s</span></div>
            </div>
            
            <div id="pImgContainer" class="player-img-container">
                <img id="pImg" alt="Ilustracja pytania">
            </div>

            <div id="questionText">Pytanie testowe?</div>
            
            <input id="answerInput" placeholder="Wpisz swoją odpowiedź tutaj..." type="text">
            <button id="submitBtn" onclick="send()">Wyślij odpowiedź</button>
            
            <div id="feedback"></div>
            
            <div class="player-status-bar">
                <div id="playerScore">Twój wynik: <span id="playerScoreValue">0 pkt</span></div>
            </div>
            
            <button class="leave-btn" onclick="leaveMatch()">Wyjdź z gry 🚪</button>
        </div>
        
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="player.js"></script>
    <script>
        // Mały skrypt pomocniczy do obsługi wizualnej zmiany awatarów i kodu pokoju
        function selectAvatar(element, avatar) {
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            if (typeof selectAvatarLogical === 'function') {
                selectAvatarLogical(avatar); 
            }
        }

        // Automatyczne przepisanie wartości pokoju do nagłówka gry po kliknięciu join
        const originalJoin = window.join;
        window.join = function() {
            const code = document.getElementById('roomCode').value;
            if(code) {
                document.getElementById('roomDisplay').innerText = code;
            }
            if(typeof originalJoin === 'function') originalJoin();
        };
    </script>
</body>
</html>
