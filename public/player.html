<!DOCTYPE html>
<html>
<head>
    <title>Player Panel ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; width: 90%; }
        
        #joinArea { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 8px 32px rgba(236, 72, 153, 0.15); text-align: center; }
        #joinArea h1 { color: #be185d; font-size: 28px; margin-bottom: 5px; font-weight: 700; }
        #joinArea .subtitle { color: #a78bfa; font-size: 14px; margin-bottom: 25px; }
        
        #gameArea { display: none; background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 8px 32px rgba(236, 72, 153, 0.15); text-align: center; }
        #gameArea.active { display: block; }
        #joinArea.hidden { display: none; }
        
        .avatar-grid { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .avatar-opt { font-size: 2rem; cursor: pointer; padding: 8px; border: 2px solid transparent; border-radius: 14px; transition: all 0.2s; background: #faf5ff; }
        .avatar-opt:hover { transform: scale(1.1); background: #fce7f3; }
        .avatar-opt.selected { border-color: #ec4899; background: #fff5f8; transform: scale(1.15); }

        #name, #roomCode, #answerInput { width: 100%; padding: 14px 18px; border: 2px solid #fce7f3; border-radius: 12px; font-size: 16px; margin: 10px 0; background: #faf5ff; color: #831843; }
        #name:focus, #roomCode:focus, #answerInput:focus { outline: none; border-color: #ec4899; background: #fff; }
        
        button { background: linear-gradient(135deg, #ec4899 0%, #d946a6 100%); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .leave-btn { background: #fee2e2; color: #ef4444; margin-top: 25px; padding: 8px; font-size: 12px; border-radius: 8px; font-weight: normal; width: auto; display: inline-block; }

        #questionText { font-size: 2rem; margin: 20px 0; color: #831843; font-weight: 600; }
        
        /* 🔬 POPRAWIONY KONTENER NA SZPILKI DLA GRACZA */
        .player-img-container { max-width: 100%; margin: 15px auto; display: none; border-radius: 16px; overflow: hidden; border: 2px solid #fce7f3; background: #fff; }
        .player-img-container img { max-width: 100%; max-height: 300px; display: block; margin: 0 auto; object-fit: contain; }

        #playerTimer { font-size: 3.5rem; color: #ec4899; font-weight: 800; font-family: monospace; }
        #feedback { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; font-size: 16px; font-weight: bold; }
        #playerScore { font-size: 18px; color: #a78bfa; margin-top: 30px; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinArea">
            <h1>✦ anki.party ✦</h1>
            <div class="subtitle">‧₊˚ ⋅ choose your animal profile ₍ᐢ. ̫ .ᐢ₎</div>
            
            <div class="avatar-grid">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🐮')">🐮</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐷')">🐷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐔')">🐔</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🦊')">🦊</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐰')">🐰</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
            </div>

            <input id="name" placeholder="Your nickname" type="text">
            <input id="roomCode" placeholder="Room Code" type="text">
            <button onclick="join()">Join Party! 🚀</button>
        </div>

        <div id="gameArea">
            <div id="playerTimer">40s</div>
            
            <div id="pImgContainer" class="player-img-container">
                <img id="pImg" alt="Fiszka">
            </div>

            <div id="questionText"></div>
            <input id="answerInput" placeholder="Type your answer..." type="text">
            <button id="submitBtn" onclick="send()">Submit answer ✧</button>
            <div id="feedback"></div>
            <div id="playerScore">♡ Score: <span id="playerScoreValue">0</span></div>
            
            <button class="leave-btn" onclick="leaveMatch()">Leave game 🚪</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="player.js"></script>
</body>
</html>
